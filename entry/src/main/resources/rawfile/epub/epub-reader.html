<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  #viewer { width: 100%; height: 100%; position: relative; }
  /* 点击区域：左右各1/3翻页，中间呼出菜单 */
  #tap-left, #tap-right { position: absolute; top: 0; height: 100%; z-index: 10; }
  #tap-left { left: 0; width: 30%; }
  #tap-right { right: 0; width: 30%; }
  /* 加载提示 */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: sans-serif; font-size: 16px; color: #999; }
  iframe { border: none; }
</style>
</head>
<body>
  <div id="viewer"></div>
  <div id="loading">加载中...</div>
  <div id="tap-left"></div>
  <div id="tap-right"></div>
  <script src="epub.min.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
