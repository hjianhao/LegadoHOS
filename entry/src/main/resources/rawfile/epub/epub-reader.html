<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  #reader-frame { width: 100%; height: 100%; position: relative; box-sizing: border-box; overflow: hidden; }
  #viewer { width: 100%; height: 100%; position: relative; box-sizing: border-box; overflow: hidden; }
  /* 加载提示 */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: sans-serif; font-size: 16px; color: #999; }
  iframe { border: none; }
</style>
</head>
<body>
  <div id="reader-frame"><div id="viewer"></div></div>
  <div id="loading">加载中...</div>
  <script src="epub.min.js"></script>
  <script src="chinese-converter.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
